<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inkbound (Modular)</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="paper">

  <!-- Header -->
  <header>
    <h1>Inkbound <span>&amp;</span> Bound</h1>
    <div class="sub">— a paper RPG, modular edition —</div>
  </header>

  <!-- Two-column layout -->
  <div class="columns">

    <!-- Left: Character sheet -->
    <aside>
      <div class="panel">
        <h2>Adventurer</h2>
        <div id="char-name" style="font-family:var(--hand);font-size:22px;">—</div>
        <div id="char-class" style="font-size:14px;">—</div>

        <div class="bar-label" style="margin-top:10px;"><span>HP</span><span id="hp-text">0/0</span></div>
        <div class="bar"><span id="hp-bar"  class="bar-fill hp-fill"  style="width:100%"></span></div>

        <div class="bar-label"><span>MP</span><span id="mp-text">0/0</span></div>
        <div class="bar"><span id="mp-bar"  class="bar-fill mp-fill"  style="width:100%"></span></div>

        <div class="bar-label"><span>EXP</span><span id="exp-text">0/10</span></div>
        <div class="bar"><span id="exp-bar" class="bar-fill exp-fill" style="width:0%"></span></div>

        <div id="stats"></div>
      </div>

      <div class="panel dashed">
        <h2>Coin Pouch</h2>
        <div id="currency">—</div>
      </div>
      <div class="panel">
        <h2>Pack</h2>
        <div id="inventory-list"></div>
      </div>
    </aside>

    <!-- Right: Main panel -->
    <main>
      <div class="panel">
        <h2>The Page Turns…</h2>
        <div id="enemy-area"></div>
        <div id="log"></div>
        <div id="action-bar"></div>
      </div>
    </main>

  </div>
</div>

<!-- Character creation modal -->
<div id="modal">
  <div class="modal-box" id="modal-body"></div>
</div>

<div style="text-align:center;margin-top:12px;display:flex;gap:8px;justify-content:center;">
  <button class="btn btn-rest" style="min-height:38px;font-size:13px;" onclick="gameSave()">💾 Save</button>
  <button class="btn btn-skill" style="min-height:38px;font-size:13px;" onclick="openShop()">🛒 Shop</button>
  <button class="btn" style="min-height:38px;font-size:13px;" onclick="connectSheets()">⚙ Sheets</button>
  <button class="btn btn-skill" style="min-height:38px;font-size:13px;" onclick="gameLoad()">📂 Load</button>
  <button class="btn" style="min-height:38px;font-size:13px;color:var(--red);" onclick="gameReset()">↺ New Game</button>
</div>

<!-- ES module entry point -->
<script type="module" src="js/main.js"></script>

</body>
</html>
