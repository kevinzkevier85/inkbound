<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Inkbound — A Paper RPG (Sheets Edition)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English+SC&family=IM+Fell+English:ital@0;1&family=Caveat:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper:        #f1e3c4;
    --paper-dark:   #d9c79a;
    --paper-shadow: #b89c66;
    --ink:          #2a1d10;
    --ink-soft:     #5a4226;
    --ink-faded:    #8a7048;
    --red-ink:      #8b2a1a;
    --green-ink:    #3e5d2a;
    --blue-ink:     #2c4a6b;
    --gold:         #a8801c;
    --crease:       rgba(80, 55, 25, 0.18);
    --serif:  'IM Fell English', 'Times New Roman', serif;
    --caps:   'IM Fell English SC', 'Times New Roman', serif;
    --hand:   'Caveat', 'Comic Sans MS', cursive;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; min-height: 100vh;
    font-family: var(--serif); color: var(--ink);
    background: radial-gradient(ellipse at 30% 20%, #5a4022 0%, #2c1d10 60%, #1a1208 100%);
    background-attachment: fixed;
  }
  .stage { max-width: 1100px; margin: 24px auto; padding: 0 20px 60px; }
  .paper {
    position: relative;
    background:
      radial-gradient(circle at 12% 88%, rgba(120, 75, 30, 0.18) 0%, transparent 6%),
      radial-gradient(circle at 88% 14%, rgba(120, 75, 30, 0.13) 0%, transparent 5%),
      radial-gradient(circle at 70% 70%, rgba(120, 75, 30, 0.10) 0%, transparent 4%),
      radial-gradient(ellipse at 50% 50%, var(--paper) 0%, var(--paper) 60%, var(--paper-dark) 100%);
    box-shadow: 0 2px 0 rgba(0,0,0,0.1), 0 20px 40px rgba(0, 0, 0, 0.55),
      inset 0 0 60px rgba(120, 80, 30, 0.18), inset 0 0 4px rgba(80, 55, 25, 0.4);
    padding: 36px 44px 50px; border-radius: 2px;
  }
  .paper::before {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    opacity: 0.35; mix-blend-mode: multiply;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.42  0 0 0 0 0.30  0 0 0 0 0.15  0 0 0 0.55 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    border-radius: 2px;
  }
  .paper::after {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background-image: repeating-linear-gradient(to bottom, transparent 0, transparent 31px, rgba(80, 55, 25, 0.07) 32px);
    border-radius: 2px;
  }
  .masthead { text-align: center; border-bottom: 2px solid var(--ink); padding-bottom: 14px; margin-bottom: 22px; position: relative; }
  .masthead::after { content: ""; display: block; height: 1px; background: var(--ink); margin-top: 3px; }
  .masthead h1 { font-family: var(--caps); font-size: 44px; margin: 0; letter-spacing: 0.06em; color: var(--ink); }
  .masthead h1 .amp { color: var(--red-ink); font-style: italic; }
  .masthead .sub { font-family: var(--hand); font-size: 22px; color: var(--ink-soft); margin-top: -6px; transform: rotate(-1deg); display: inline-block; }
  .data-source-tag {
    position: absolute; top: 8px; right: 8px;
    font-family: var(--caps); font-size: 10px; letter-spacing: 0.1em;
    padding: 3px 8px; border: 1px solid var(--ink-faded);
    color: var(--ink-soft); background: rgba(255,250,230,0.5);
  }
  .data-source-tag.live { color: var(--green-ink); border-color: var(--green-ink); }
  .data-source-tag.error { color: var(--red-ink); border-color: var(--red-ink); }

  .columns { display: grid; grid-template-columns: 320px 1fr; gap: 28px; position: relative; z-index: 1; }
  @media (max-width: 820px) { .columns { grid-template-columns: 1fr; } }
  .panel { border: 1.5px solid var(--ink); padding: 14px 16px; margin-bottom: 18px; background: rgba(255, 250, 230, 0.25); position: relative; }
  .panel.dashed { border-style: dashed; }
  .panel h2 { font-family: var(--caps); font-size: 18px; margin: 0 0 10px; letter-spacing: 0.08em; border-bottom: 1px solid var(--ink-faded); padding-bottom: 4px; }
  .panel.taped::before, .panel.taped::after {
    content: ""; position: absolute; width: 60px; height: 18px;
    background: rgba(220, 200, 140, 0.55); border: 1px solid rgba(120, 90, 40, 0.25);
    box-shadow: 0 1px 2px rgba(0,0,0,0.15);
  }
  .panel.taped::before { top: -10px; left: -14px; transform: rotate(-12deg); }
  .panel.taped::after  { bottom: -10px; right: -14px; transform: rotate(8deg); }
  .stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px 14px; font-size: 15px; }
  .stat-grid .row { display: flex; justify-content: space-between; border-bottom: 1px dotted var(--ink-faded); padding: 2px 0; }
  .stat-grid .row .name { font-family: var(--caps); letter-spacing: 0.05em; }
  .stat-grid .row .val  { font-weight: bold; }
  .bar { height: 10px; border: 1px solid var(--ink); background: rgba(255,255,255,0.25); margin: 4px 0 8px; position: relative; overflow: hidden; }
  .bar > span { display: block; height: 100%; background: var(--red-ink); transition: width 0.4s ease; }
  .bar.mp > span { background: var(--blue-ink); }
  .bar.exp > span { background: var(--green-ink); }
  .bar-label { display: flex; justify-content: space-between; font-family: var(--caps); font-size: 13px; letter-spacing: 0.05em; }
  #log { height: 320px; overflow-y: auto; padding-right: 6px; font-size: 16px; line-height: 1.55; }
  #log .entry { margin: 0 0 6px; }
  #log .entry.system { color: var(--ink-soft); font-style: italic; }
  #log .entry.combat { color: var(--red-ink); }
  #log .entry.heal   { color: var(--green-ink); }
  #log .entry.loot   { color: var(--gold); font-weight: bold; }
  #log .entry.special{ color: #6b1e8a; font-weight: bold; letter-spacing: 0.04em; }
  #log .entry.handwritten { font-family: var(--hand); font-size: 22px; color: var(--ink-soft); transform: rotate(-0.4deg); display: inline-block; }
  #log::-webkit-scrollbar { width: 8px; }
  #log::-webkit-scrollbar-thumb { background: var(--ink-faded); border-radius: 4px; }
  .actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  button.btn {
    font-family: var(--caps); letter-spacing: 0.08em;
    background: var(--paper); color: var(--ink);
    border: 1.5px solid var(--ink); padding: 8px 14px;
    cursor: pointer; font-size: 14px;
    box-shadow: 2px 2px 0 var(--ink); transition: all 0.08s ease; position: relative;
  }
  button.btn:hover:not(:disabled) { background: var(--ink); color: var(--paper); transform: translate(1px, 1px); box-shadow: 1px 1px 0 var(--ink); }
  button.btn:active:not(:disabled) { transform: translate(2px, 2px); box-shadow: 0 0 0 var(--ink); }
  button.btn:disabled { opacity: 0.4; cursor: not-allowed; }
  button.btn.danger { color: var(--red-ink); }
  button.btn.danger:hover:not(:disabled) { background: var(--red-ink); color: var(--paper); }
  button.btn.small { font-size: 12px; padding: 4px 8px; box-shadow: 1px 1px 0 var(--ink); }
  button.btn.green { color: var(--green-ink); border-color: var(--green-ink); box-shadow: 2px 2px 0 var(--green-ink); }
  button.btn.green:hover:not(:disabled) { background: var(--green-ink); color: var(--paper); }
  button.btn.attack { color: var(--red-ink); border-color: var(--red-ink); box-shadow: 3px 3px 0 var(--red-ink); font-weight: bold; }
  button.btn.attack:hover:not(:disabled) { background: var(--red-ink); color: var(--paper); }
  button.btn.skill  { color: var(--blue-ink); border-color: var(--blue-ink); box-shadow: 2px 2px 0 var(--blue-ink); }
  button.btn.skill:hover:not(:disabled)  { background: var(--blue-ink); color: var(--paper); }
  button.btn.item   { color: var(--green-ink); border-color: var(--green-ink); box-shadow: 2px 2px 0 var(--green-ink); }
  button.btn.flee   { color: var(--ink-soft); border-color: var(--ink-soft); box-shadow: 2px 2px 0 var(--ink-soft); }
  button.btn.flee:hover:not(:disabled)   { background: var(--ink-soft); color: var(--paper); }
  button.btn.big    { font-size: 16px; padding: 12px 18px; }
  /* battle action grid — bigger touch targets, better visibility */
  .battle-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 16px;
    padding: 12px;
    background: rgba(80, 55, 25, 0.06);
    border: 1px dashed var(--ink-faded);
    border-radius: 4px;
  }
  .battle-actions .btn {
    width: 100%;
    min-height: 56px;
    font-size: 15px;
    padding: 12px 14px;
    text-transform: uppercase;
    font-weight: bold;
    letter-spacing: 0.1em;
  }
  .battle-actions .btn.span2 {
    grid-column: span 2;
    min-height: 64px;
    font-size: 18px;
  }
  /* explore-mode bigger buttons */
  .explore-actions { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 10px; margin-top: 14px; }
  .explore-actions .btn { width: 100%; min-height: 50px; font-size: 14px; }
  @media (max-width: 600px) {
    .explore-actions { grid-template-columns: 1fr; }
    .battle-actions { grid-template-columns: 1fr 1fr; }
  }
  /* nav-style top bar buttons (Pack & Tomes) — color-coded */
  .nav-actions { display: flex; flex-wrap: wrap; gap: 6px; margin: 0 0 8px; }
  .nav-actions .btn { font-size: 13px; padding: 8px 14px; min-height: 40px; }
  button.btn.gold { color: var(--gold); border-color: var(--gold); box-shadow: 2px 2px 0 var(--gold); }
  button.btn.gold:hover:not(:disabled) { background: var(--gold); color: var(--paper); }
  button.btn.purple { color: #6b1e8a; border-color: #6b1e8a; box-shadow: 2px 2px 0 #6b1e8a; }
  button.btn.purple:hover:not(:disabled) { background: #6b1e8a; color: var(--paper); }
  /* codex tabs */
  .codex-tabs { display: flex; gap: 4px; border-bottom: 2px solid var(--ink); margin-bottom: 12px; }
  .codex-tab { font-family: var(--caps); padding: 6px 14px; cursor: pointer; border: 1.5px solid var(--ink); border-bottom: none;
               background: rgba(255,250,230,0.4); letter-spacing: 0.06em; font-size: 13px; }
  .codex-tab.active { background: var(--ink); color: var(--paper); }
  .codex-content { max-height: 50vh; overflow-y: auto; padding-right: 4px; }
  .codex-entry { border: 1px solid var(--ink-faded); padding: 10px 12px; margin-bottom: 8px; background: rgba(255,250,230,0.3); }
  .codex-entry.locked { opacity: 0.45; font-style: italic; }
  .codex-entry h4 { font-family: var(--caps); margin: 0 0 4px; letter-spacing: 0.06em; }
  .codex-stats { font-size: 12px; color: var(--ink-soft); display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px 10px; margin-top: 4px; }
  .codex-stats span b { color: var(--ink); }
  .quest-card { border: 1.5px solid var(--ink); padding: 10px 14px; margin-bottom: 10px; background: rgba(255,250,230,0.4); position: relative; }
  .quest-card.active { border-color: var(--blue-ink); background: rgba(220,235,250,0.3); }
  .quest-card.complete { border-color: var(--gold); background: rgba(255,240,200,0.5); }
  .quest-card h4 { font-family: var(--caps); margin: 0 0 4px; }
  .quest-progress { font-family: var(--hand); font-size: 18px; color: var(--ink-soft); }
  .quest-reward { color: var(--gold); font-weight: bold; font-size: 13px; }
  button.btn.green:hover:not(:disabled) { background: var(--green-ink); color: var(--paper); }
  .enemy { text-align: center; padding: 14px; border: 2px solid var(--ink); background: rgba(255, 245, 215, 0.4); margin-bottom: 14px; position: relative; }
  .enemy.special { border-color: #6b1e8a; background: rgba(255, 220, 245, 0.3); box-shadow: 0 0 0 3px rgba(107, 30, 138, 0.15); }
  .enemy h3 { font-family: var(--caps); margin: 0 0 4px; font-size: 22px; letter-spacing: 0.06em; }
  .enemy .level { font-family: var(--hand); color: var(--ink-soft); font-size: 18px; }
  .enemy .sketch { font-size: 64px; line-height: 1; margin: 6px 0; filter: grayscale(0.4) sepia(0.3); }
  .list-item { display: flex; justify-content: space-between; align-items: center; padding: 6px 4px; border-bottom: 1px dotted var(--ink-faded); }
  .list-item:last-child { border-bottom: none; }
  .list-item .meta { font-size: 13px; color: var(--ink-soft); font-style: italic; }
  .list-item .controls { display: flex; gap: 4px; }
  .modal-backdrop { position: fixed; inset: 0; background: rgba(20, 12, 5, 0.78); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
  .modal-backdrop.open { display: flex; }
  .modal { background: var(--paper); border: 2px solid var(--ink); padding: 28px 30px; max-width: 600px; width: 100%; box-shadow: 8px 8px 0 rgba(0,0,0,0.4); position: relative; max-height: 85vh; overflow-y: auto; }
  .modal h2 { font-family: var(--caps); margin: 0 0 12px; border-bottom: 1px solid var(--ink); padding-bottom: 6px; }
  .modal .options { display: grid; gap: 10px; margin-top: 16px; }
  .class-card { border: 1.5px solid var(--ink); padding: 12px 14px; cursor: pointer; background: rgba(255, 250, 230, 0.4); transition: all 0.1s ease; }
  .class-card:hover { background: var(--ink); color: var(--paper); }
  .class-card .name { font-family: var(--caps); font-size: 18px; letter-spacing: 0.05em; }
  .class-card .desc { font-family: var(--hand); font-size: 18px; line-height: 1.2; }
  .currency { display: flex; flex-wrap: wrap; gap: 12px; font-family: var(--caps); font-size: 13px; letter-spacing: 0.06em; }
  .currency .c { white-space: nowrap; }
  .currency .c b { color: var(--gold); margin-left: 4px; }
  .stamp { position: absolute; top: 12px; right: 14px; font-family: var(--caps); color: var(--red-ink); border: 2px solid var(--red-ink); padding: 2px 8px; font-size: 11px; letter-spacing: 0.15em; transform: rotate(8deg); opacity: 0.65; }
  .margin-note { font-family: var(--hand); color: var(--ink-soft); font-size: 18px; transform: rotate(-1deg); display: inline-block; margin-top: 4px; }
  .equipped-tag { font-family: var(--caps); font-size: 10px; color: var(--red-ink); border: 1px solid var(--red-ink); padding: 0 4px; margin-left: 6px; letter-spacing: 0.1em; }
  .footer-note { text-align: center; margin-top: 20px; font-family: var(--hand); color: var(--ink-soft); font-size: 18px; }
  @keyframes inkbleed { from { opacity: 0; filter: blur(6px); } to { opacity: 1; filter: blur(0); } }
  .paper { animation: inkbleed 0.6s ease-out; }
  @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-3px); } 75% { transform: translateX(3px); } }
  .enemy.hit { animation: shake 0.25s ease; }
  .hidden { display: none !important; }

  /* Sheet config form */
  .sheet-form input[type="text"] {
    width: 100%; padding: 6px 8px; font-family: var(--serif); font-size: 14px;
    background: rgba(255,255,255,0.4); border: 1px solid var(--ink-faded);
    color: var(--ink); margin-bottom: 8px;
  }
  .sheet-form label {
    display: block; font-family: var(--caps); font-size: 12px;
    letter-spacing: 0.08em; margin-bottom: 4px;
  }
  .sheet-help {
    background: rgba(255, 250, 220, 0.6); border-left: 3px solid var(--gold);
    padding: 8px 12px; font-size: 13px; margin: 10px 0; line-height: 1.5;
  }
  .sheet-help code {
    background: rgba(80,55,25,0.1); padding: 1px 4px; font-size: 12px;
    word-break: break-all;
  }
  .reload-status {
    font-family: var(--hand); color: var(--ink-soft); font-size: 18px;
    margin-top: 8px;
  }
  .reload-status.error { color: var(--red-ink); }
  .reload-status.ok { color: var(--green-ink); }
</style>
</head>
<body>

<div class="stage">
  <div class="paper">
    <header class="masthead">
      <span class="data-source-tag" id="sourceTag">DEFAULTS</span>
      <h1>Inkbound <span class="amp">&amp;</span> Bound</h1>
      <div class="sub">— a paper RPG, scribbled in the margins —</div>
    </header>

    <div class="columns">
      <aside>
        <section class="panel taped" id="charSheet">
          <span class="stamp">CHAR. SHEET</span>
          <h2>Adventurer</h2>
          <div id="charBasics" style="margin-bottom: 10px;">
            <div style="font-family: var(--hand); font-size: 24px;" id="charName">—</div>
            <div style="font-size: 14px;">
              <span id="charClass">—</span> · Lv. <span id="charLevel">1</span>
            </div>
          </div>
          <div class="bar-label"><span>HP</span><span id="hpText">0/0</span></div>
          <div class="bar"><span id="hpBar" style="width:100%"></span></div>
          <div class="bar-label"><span>MP</span><span id="mpText">0/0</span></div>
          <div class="bar mp"><span id="mpBar" style="width:100%"></span></div>
          <div class="bar-label"><span>EXP</span><span id="expText">0/10</span></div>
          <div class="bar exp"><span id="expBar" style="width:0%"></span></div>
          <div class="stat-grid" id="statGrid"></div>
        </section>
        <section class="panel dashed">
          <h2>Coin Pouch</h2>
          <div class="currency" id="currencyLine">—</div>
        </section>
        <section class="panel">
          <h2>Equipment</h2>
          <div id="equipList" style="font-size: 14px;"></div>
        </section>
        <section class="panel dashed">
          <h2>Travels</h2>
          <div id="mapInfo" style="font-size: 14px;"></div>
          <div class="actions" style="margin-top:8px;">
            <button class="btn skill" id="btnTravel" style="flex:1;">🗺 Travel</button>
            <button class="btn green" id="btnRest" style="flex:1;">🛏 Inn</button>
          </div>
        </section>
      </aside>

      <main>
        <section class="panel" id="encounterPanel">
          <h2>The Page Turns…</h2>
          <div id="enemyArea"></div>
          <div id="log"></div>
          <div class="actions" id="actionBar"></div>
        </section>

        <section class="panel taped">
          <h2>Pack &amp; Tomes</h2>
          <div class="nav-actions">
            <button class="btn item"   id="btnInv">🎒 Inventory</button>
            <button class="btn gold"   id="btnShop">💰 Shop</button>
            <button class="btn skill"  id="btnCodex">📖 Codex</button>
            <button class="btn purple" id="btnClassUp">✦ Class</button>
            <button class="btn green"  id="btnSave">💾 Save</button>
            <button class="btn"        id="btnLoad">📂 Load</button>
            <button class="btn green"  id="btnSheet" onclick="window._openSheets&&window._openSheets()">⚙ Sheets</button>
            <button class="btn danger" id="btnReset">⌫ Reset</button>
          </div>
          <div class="margin-note">📖 Codex รวม: เผ่ามอน · ไอเทม · เควส</div>
        </section>
      </main>
    </div>
    <div class="footer-note">~ a tale told in ink, never finished ~</div>
  </div>
</div>

<div class="modal-backdrop" id="modalBack">
  <div class="modal">
    <h2 id="modalTitle">—</h2>
    <div id="modalBody"></div>
    <div class="options" id="modalOptions"></div>
    <div style="margin-top:14px; text-align:right;">
      <button class="btn small" id="modalClose">Close</button>
    </div>
  </div>
</div>

<script>
/* ===========================================================
   INKBOUND — modular RPG with Google Sheets integration
   =========================================================== */

const rand = (a, b) => Math.floor(Math.random() * (b - a + 1)) + a;
const pick = arr => arr[Math.floor(Math.random() * arr.length)];
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));


/* =========================================================
   CSV PARSER
   ========================================================= */
const CSV = (() => {
  function parse(text) {
    const lines = text.replace(/\r/g, '').split('\n').filter(l => l.trim());
    if (lines.length === 0) return [];
    const headers = parseLine(lines[0]).map(h => h.trim());
    return lines.slice(1).map(line => {
      const cells = parseLine(line);
      const obj = {};
      headers.forEach((h, i) => { obj[h] = cells[i] !== undefined ? cells[i].trim() : ''; });
      return obj;
    });
  }
  function parseLine(line) {
    const result = []; let cur = ''; let inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"' && line[i+1] === '"') { cur += '"'; i++; }
      else if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { result.push(cur); cur = ''; }
      else { cur += c; }
    }
    result.push(cur);
    return result;
  }
  function num(v, def=0) { const n = parseFloat(v); return isNaN(n) ? def : n; }
  function int(v, def=0) { const n = parseInt(v); return isNaN(n) ? def : n; }
  function bool(v) { return String(v).toUpperCase() === 'TRUE' || v === '1'; }
  return { parse, num, int, bool };
})();


/* =========================================================
   SHEETS LOADER
   - Loads CSV from Google Sheets "Publish to web"
   - Each tab is a separate gid in the URL
   ========================================================= */
const Sheets = (() => {
  const STORAGE_KEY = "inkbound_sheet_config";
  let config = loadConfig();

  function loadConfig() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return { sheetId: "", tabs: { monsters:"", items:"", classes:"", skills:"", maps:"", config:"" } };
  }
  function saveConfig(c) {
    config = c;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(c));
  }
  function getConfig() { return config; }

  // Build CSV URL from sheet ID + gid
  function buildUrl(sheetId, gid) {
    return `https://docs.google.com/spreadsheets/d/e/${sheetId}/pub?gid=${gid}&single=true&output=csv`;
  }
  // Or accept a full pub-URL directly
  function urlForTab(tab) {
    if (!config.tabs[tab]) return null;
    const v = config.tabs[tab].trim();
    if (v.startsWith("http")) return v;
    if (config.sheetId && /^\d+$/.test(v)) return buildUrl(config.sheetId, v);
    return null;
  }

  // CORS proxies — tried in order until one works
  const PROXIES = [
    u => u,                                                          // direct (works if hosted on server)
    u => `https://corsproxy.io/?${encodeURIComponent(u)}`,          // corsproxy.io
    u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`, // allorigins
    u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`, // codetabs
  ];

  async function fetchWithProxy(rawUrl) {
    let lastErr;
    for (const proxy of PROXIES) {
      try {
        const proxied = proxy(rawUrl);
        const resp = await fetch(proxied, { signal: AbortSignal.timeout(8000) });
        if (!resp.ok) { lastErr = new Error(`HTTP ${resp.status}`); continue; }
        const text = await resp.text();
        // Sanity check: if Google redirects to login page, text won't look like CSV
        if (text.includes("accounts.google.com") || text.includes("Sign in")) {
          lastErr = new Error("Sheet is not public — check 'Publish to web'");
          continue;
        }
        return text;
      } catch (e) { lastErr = e; }
    }
    throw lastErr || new Error("All proxies failed");
  }

  async function fetchTab(tab) {
    const url = urlForTab(tab);
    if (!url) return null;
    const text = await fetchWithProxy(url);
    return CSV.parse(text);
  }

  async function fetchRaw(url) {
    return await fetchWithProxy(url);
  }

  async function loadAll() {
    const result = {};
    const tabs = ["monsters","items","classes","skills","maps","config"];
    for (const t of tabs) {
      try {
        const data = await fetchTab(t);
        if (data) result[t] = data;
      } catch (e) {
        console.error(`Sheet tab ${t} failed:`, e);
        throw e;
      }
    }
    return result;
  }

  function isConfigured() {
    return Object.values(config.tabs).some(v => v && v.trim());
  }

  return { getConfig, saveConfig, loadAll, isConfigured, fetchRaw };
})();

      pool:["soul_scarab","soul_scarab","soul_scarab","void_wisp","void_wisp","void_wisp","void_wisp","shadow_walker","shadow_walker","shadow_walker"],
      miniboss:[], minLvl:10, requiresKey:"void_key" },
  };
  let DB = { ...DEFAULTS };
  let specialLocation = pick(Object.keys(DB));

  function loadFromRows(rows) {
    const next = {};
    for (const r of rows) {
      if (!r.id) continue;
      next[r.id] = {
        name: r.name, desc: r.desc,
        minLvl: CSV.int(r.min_lvl, 1),
        pool: (r.pool || "").split("|").map(s => s.trim()).filter(Boolean),
        miniboss: (r.miniboss || "").split("|").map(s => s.trim()).filter(Boolean),
        requiresKey: r.requires_key || null,
      };
    }
    DB = next;
    if (!DB[specialLocation]) specialLocation = pick(Object.keys(DB)) || "meadow";
  }
  function reset() { DB = { ...DEFAULTS }; specialLocation = pick(Object.keys(DB)); }

  function getSpecialLocation() { return specialLocation; }
  function setSpecialLocation(id) { if (DB[id]) specialLocation = id; }
  function moveSpecialAfterDeath() {
    const others = Object.keys(DB).filter(k => k !== specialLocation);
    specialLocation = pick(others) || specialLocation;
  }
  function rollEncounter(mapId, playerLvl) {
    const m = DB[mapId]; if (!m) return null;
    const cfg = Config.get();
    const isVoid = mapId === "void_forest";
    // Soul Eater spawn: 10% in Void Forest (always), 4% elsewhere (only if specialLocation matches)
    const seChance = isVoid ? (cfg.void_special_chance || 0.10) : (specialLocation === mapId ? cfg.special_spawn_chance : 0);
    if (seChance > 0 && Math.random() < seChance) {
      const id = Monsters.findSpecial();
      if (id) return Monsters.make(id);
    }
    if (playerLvl >= m.minLvl + 2 && m.miniboss.length && Math.random() < cfg.miniboss_chance) {
      return Monsters.make(pick(m.miniboss));
    }
    return Monsters.make(pick(m.pool));
  }
  return { loadFromRows, reset, rollEncounter, getSpecialLocation, setSpecialLocation, moveSpecialAfterDeath,
           get DB() { return DB; } };
})();

    };
    applyGrowth(p, Classes.DB[cls].growth);
    recompute(p, true);
    return p;
  }
  function applyGrowth(p, g) {
    p.str += g.str; p.dex += g.dex; p.int += g.int;
    p.vit += g.vit; p.wis += g.wis; p.luck += g.luck;
  }
  function derived(p) {
    let bonus = { hp:0, mp:0, atk:0, mag:0, def:0, res:0, spd:0, crit:0, dodge:0, str:0, dex:0, int:0, vit:0, wis:0, luck:0, hp_pct:0 };
    for (const slot of ["weapon","armor","acc"]) {
      const id = p.equip[slot];
      if (id && Items.exists(id)) {
        const b = Items.get(id).bonus || {};
        for (const k of Object.keys(bonus)) bonus[k] += (b[k] || 0);
      }
    }
    const cfg = Config.get();
    const STR = p.str + bonus.str, DEX = p.dex + bonus.dex,
          INT = p.int + bonus.int, VIT = p.vit + bonus.vit,
          WIS = p.wis + bonus.wis, LUK = p.luck + bonus.luck;
    const hpBase = 30 + VIT * cfg.hp_per_vit + p.level * cfg.hp_per_level + bonus.hp;
    const hpMult = 1 + ((bonus.hp_pct || 0) / 100);
    return {
      hpMax:  Math.max(1, Math.floor(hpBase * hpMult)),
      mpMax:  10 + WIS * cfg.mp_per_wis + INT * cfg.mp_per_int + p.level * cfg.mp_per_level + bonus.mp,
      atk:    STR * 2 + bonus.atk,
      mag:    INT * 2 + bonus.mag,
      def:    Math.floor(VIT * 1.2) + bonus.def,
      res:    Math.floor(WIS * 1.2) + bonus.res,
      spd:    DEX + bonus.spd,
      crit:   5 + Math.floor(LUK * 0.8) + bonus.crit,
      dodge:  Math.floor(DEX * 0.4) + bonus.dodge,
      STR, DEX, INT, VIT, WIS, LUK
    };
  }
  function recompute(p, fillResources=false) {
    const d = derived(p);
    if (fillResources) { p.hp = d.hpMax; p.mp = d.mpMax; }
    p.hp = clamp(p.hp, 0, d.hpMax);
    p.mp = clamp(p.mp, 0, d.mpMax);
    return d;
  }
  function expForLevel(lv) {
    const c = Config.get();
    return c.exp_curve_base + (lv - 1) * c.exp_curve_linear + Math.pow(lv, 2) * c.exp_curve_quad;
  }
  function gainExp(p, amount, log) {
    p.exp += amount;
    log(`Gained ${amount} EXP.`, "loot");
    while (p.exp >= expForLevel(p.level)) {
      p.exp -= expForLevel(p.level);
      p.level += 1;
      applyGrowth(p, Classes.DB[p.cls].growth);
      recompute(p, true);
      log(`★ Level up! Now level ${p.level}.`, "loot");
      if (p.level === 5)  log("A new path opens... (Class change available)", "system");
      if (p.level === 12) log("Mastery beckons... (Tier 3 available)", "system");
    }
  }
  function addItem(p, id, qty=1) {
    const slot = p.inv.find(s => s.id === id);
    if (slot) slot.qty += qty; else p.inv.push({ id, qty });
  }
  function removeItem(p, id, qty=1) {
    const idx = p.inv.findIndex(s => s.id === id);
    if (idx === -1) return false;
    p.inv[idx].qty -= qty;
    if (p.inv[idx].qty <= 0) p.inv.splice(idx, 1);
    return true;
  }
  return { makeNew, derived, recompute, gainExp, expForLevel, addItem, removeItem, applyGrowth };
})();



/* =========================================================
   QUESTS  (quests.py) — repeatable bounty board
   ========================================================= */
const Quests = (() => {
  const DB = {
    goblin_hunt: {
      name: "Goblin Bounty",
      desc: "Goblins have been raiding the Meadow. Cull 5 of them.",
      target: { monster: "goblin", count: 5 },
      reward: { money: 50, gold: 10 },
      minLvl: 1
    },
    skeleton_purge: {
      name: "Mine Cleanup",
      desc: "Restless skeletons stalk the Hollow Mine. Put 5 to rest.",
      target: { monster: "skeleton_miner", count: 5 },
      reward: { money: 120, gold: 20 },
      minLvl: 4
    },
    beetle_bounty: {
      name: "Stone Bounty",
      desc: "Stone Beetles are damaging the mine supports. Crush 3.",
      target: { monster: "stone_beetle", count: 3 },
      reward: { money: 200, gold: 30, gem: 1 },
      minLvl: 5
    },
  };

  function ensure(p) {
    if (!p.quests) p.quests = { active: {}, completed_count: {} };
    if (!p.quests.active) p.quests.active = {};
    if (!p.quests.completed_count) p.quests.completed_count = {};
  }

  function status(p, qid) {
    ensure(p);
    const q = DB[qid];
    if (!q) return "unknown";
    const a = p.quests.active[qid];
    if (!a) return "available";
    if (a.progress >= q.target.count) return "ready";
    return "active";
  }

  function accept(p, qid) {
    ensure(p);
    const q = DB[qid];
    if (!q) return false;
    if (p.level < (q.minLvl||1)) return false;
    if (p.quests.active[qid]) return false;
    p.quests.active[qid] = { progress: 0 };
    return true;
  }

  function claim(p, qid, log) {
    ensure(p);
    const q = DB[qid];
    if (!q || status(p, qid) !== "ready") return false;
    delete p.quests.active[qid];
    p.quests.completed_count[qid] = (p.quests.completed_count[qid] || 0) + 1;
    // grant rewards
    for (const [k, v] of Object.entries(q.reward)) {
      p[k] = (p[k] || 0) + v;
      if (log) log(`Reward: +${v} ${k}`, "loot");
    }
    return true;
  }

  // call when a monster is killed — increments any matching active quest
  function onKill(p, monsterId, log) {
    ensure(p);
    for (const [qid, a] of Object.entries(p.quests.active)) {
      const q = DB[qid];
      if (q && q.target.monster === monsterId) {
        if (a.progress < q.target.count) {
          a.progress += 1;
          if (a.progress >= q.target.count) {
            if (log) log(`✓ Quest "${q.name}" ready to claim!`, "loot");
          } else {
            if (log) log(`(${q.name}: ${a.progress}/${q.target.count})`, "system");
          }
        }
      }
    }
  }

  return { DB, status, accept, claim, onKill, ensure };
})();


/* =========================================================
   COMBAT  (combat.py)
   ========================================================= */
const Combat = (() => {
  let state = null;
  function start(player, enemy, log) {
    state = { player, enemy, over:false };
    log(`A ${enemy.name} (Lv.${enemy.lvl}) appears!`, enemy.special ? "special" : "system");
    if (enemy.special) log("✦ The Wandering Soul Eater has found you. ✦", "special");
  }
  function isInCombat() { return state && !state.over; }
  function getEnemy() { return state ? state.enemy : null; }
  function endCombat() { if (state) state.over = true; }
  function rollHit(atkSpd, defDodge) {
    const acc = 90 + (atkSpd * 0.5) - defDodge;
    return Math.random() * 100 < acc;
  }
  function playerAttack(skillId, log) {
    const p = state.player, e = state.enemy;
    const d = Player.derived(p);
    const skill = skillId ? Classes.Skills[skillId] : null;
    if (skill) {
      if (p.mp < skill.mp) { log("Not enough MP.", "system"); return false; }
      p.mp -= skill.mp;
    }
    if (!rollHit(d.spd, 0)) { log(`You swing — ${e.name} side-steps.`, "combat"); return true; }
    let dmg = 0, type = skill ? skill.type : "phys", crit = false;
    const power = skill ? skill.power : 1.0;
    if (type === "phys")     dmg = (d.atk * power) - e.def * 0.6;
    else if (type === "mag") dmg = (d.mag * power) - e.res * 0.6;
    else                     dmg = d.atk * power;
    dmg = Math.max(1, Math.round(dmg + rand(-2, 2)));
    let critChance = d.crit + (skill && skill.critBonus ? skill.critBonus : 0);
    if (Math.random() * 100 < critChance) { dmg = Math.round(dmg * 1.7); crit = true; }
    if (skill && skill.gambler) {
      const mult = pick([0.5, 1, 1.5, 2, 3]);
      dmg = Math.round(dmg * mult);
      log(`Gambler's Throw — fate rolls ×${mult}!`, "combat");
    }
    let hits = (skill && skill.multihit) ? skill.multihit : 1;
    let total = 0;
    for (let i = 0; i < hits; i++) { e.hp -= dmg; total += dmg; }
    const label = skill ? skill.name : "Attack";
    log(`▸ ${label}${hits>1?` ×${hits}`:""} — ${e.name} takes ${total} dmg${crit?" (crit!)":""}.`, "combat");
    if (skill && skill.recoil) {
      const recoil = Math.round(dmg * skill.recoil);
      p.hp -= recoil;
      log(`You take ${recoil} recoil damage.`, "combat");
    }
    if (skill && skill.hex)       p.flags.hexedFoe = 0.7;
    if (skill && skill.dodgeBuff) p.flags.dodgeBuff = skill.dodgeBuff;
    return true;
  }
  function enemyTurn(log) {
    const p = state.player, e = state.enemy;
    if (e.hp <= 0) return;
    const d = Player.derived(p);
    const dodge = d.dodge + (p.flags.dodgeBuff || 0);
    p.flags.dodgeBuff = 0;
    if (!rollHit(e.spd, dodge)) { log(`${e.name} attacks — you dodge!`, "combat"); return; }
    const useMag = e.mag > e.atk && Math.random() < 0.4;
    let raw = useMag ? e.mag * 1.2 : e.atk * 1.0;
    const mit = useMag ? d.res * 0.6 : d.def * 0.6;
    let dmg = Math.max(1, Math.round(raw - mit + rand(-2, 2)));
    if (p.flags.hexedFoe) { dmg = Math.round(dmg * p.flags.hexedFoe); p.flags.hexedFoe = 0; }
    p.hp -= dmg;
    log(`${e.name} ${useMag?"casts a hex":"strikes"} — you take ${dmg} dmg.`, "combat");
  }
  function checkEnd(log) {
    const p = state.player, e = state.enemy;
    if (e.hp <= 0) {
      state.over = true;
      log(`${e.name} fades back into the page.`, "system");
      const exp = rand(e.expR[0], e.expR[1]);
      const money = rand(e.moneyR[0], e.moneyR[1]);
      Player.gainExp(p, exp, log);
      p.money += money;
      log(`Found ${money} coins.`, "loot");

      // Bestiary tracking
      if (!p.bestiary) p.bestiary = {};
      p.bestiary[e.id] = (p.bestiary[e.id] || 0) + 1;

      // Quest progress
      Quests.onKill(p, e.id, log);

      // Soul Eater bonus (special)
      if (e.special) {
        const soul = rand(e.soulR[0], e.soulR[1]);
        const honor = rand(e.honorR[0], e.honorR[1]);
        // Bonus souls in Void Forest
        const isVoid = p.map === "void_forest";
        const bonusSoul = isVoid ? rand(1, 2) : 0;
        p.soul += soul + bonusSoul;
        p.honor += honor;
        log(`Gained ${soul + bonusSoul} Soul${bonusSoul ? " (+" + bonusSoul + " void bonus)" : ""} and ${honor} Honor.`, "special");
        p.flags.soulEaterSlain = true;
        Maps.moveSpecialAfterDeath();
        log(`The Soul Eater stirs again, somewhere far away...`, "special");
        log(`(A hidden class is now available.)`, "special");
      }

      // Soul drops for non-special monsters (e.g. Soul Scarab)
      if (!e.special && e.soulR) {
        const sn = rand(e.soulR[0], e.soulR[1]);
        if (sn > 0) { p.soul += sn; log(`Gained ${sn} Soul.`, "special"); }
      }

      // Standard drops
      for (const [id, ch] of (e.drops || [])) {
        if (Math.random() < ch && Items.exists(id)) {
          Player.addItem(p, id);
          log(`Picked up: ${Items.get(id).name}.`, "loot");
        }
      }

      // Global drops
      const cfg = Config.get();
      // Void Key — drops 1% from any non-void, non-special monster
      if (!e.special && !e.void && p.map !== "void_forest" && Items.exists("void_key")) {
        if (Math.random() < (cfg.void_key_drop || 0.01)) {
          Player.addItem(p, "void_key");
          log(`✦ A shard of black glass falls from the page... Key of the Void!`, "special");
        }
      }
      // Void Eye Cloak — drops 5% from any monster in Void Forest
      if (p.map === "void_forest" && Items.exists("void_eye_cloak")) {
        if (Math.random() < (cfg.void_cloak_drop || 0.05)) {
          Player.addItem(p, "void_eye_cloak");
          log(`✦ Something watches you wear it... Void-Eye Cloak!`, "special");
        }
      }

      Player.recompute(p);
      return "win";
    }
    if (p.hp <= 0) {
      state.over = true;
      log("You collapse onto the page... (revived at half HP, lost coins)", "system");
      const d = Player.derived(p);
      p.hp = Math.max(1, Math.floor(d.hpMax / 2));
      const cfg = Config.get();
      p.money = Math.max(0, Math.floor(p.money * (1 - cfg.death_money_loss)));
      return "lose";
    }
    return null;
  }
  return { start, playerAttack, enemyTurn, checkEnd, isInCombat, getEnemy, endCombat };
})();


/* =========================================================
   SAVE  (save_system.py)
   ========================================================= */
const SaveSystem = (() => {
  const KEY = "inkbound_save_v2";
  function save(player) {
    const data = { player, specialLocation: Maps.getSpecialLocation() };
    localStorage.setItem(KEY, JSON.stringify(data));
  }
  function load() {
    const raw = localStorage.getItem(KEY);
    if (!raw) return null;
    try {
      const data = JSON.parse(raw);
      if (data.specialLocation) Maps.setSpecialLocation(data.specialLocation);
      return data.player;
    } catch (e) { return null; }
  }
  function clear() { localStorage.removeItem(KEY); }
  function exists() { return !!localStorage.getItem(KEY); }
  return { save, load, clear, exists };
})();


/* =========================================================
   GAME / UI  (main.py)
   ========================================================= */
const Game = (() => {
  let player = null;

  const logEl = () => document.getElementById("log");
  function log(msg, cls = "") {
    const div = document.createElement("div");
    div.className = "entry " + cls;
    div.textContent = msg;
    logEl().appendChild(div);
    logEl().scrollTop = logEl().scrollHeight;
  }
  function logHandwritten(msg) {
    const wrap = document.createElement("div");
    wrap.className = "entry";
    const span = document.createElement("span");
    span.className = "handwritten";
    span.textContent = msg;
    wrap.appendChild(span);
    logEl().appendChild(wrap);
    logEl().scrollTop = logEl().scrollHeight;
  }

  function setSourceTag(state, text) {
    const tag = document.getElementById("sourceTag");
    tag.className = "data-source-tag " + (state || "");
    tag.textContent = text;
  }

  function render() {
    if (!player) return;
    const d = Player.derived(player);
    document.getElementById("charName").textContent = player.name;
    document.getElementById("charClass").textContent = player.cls;
    document.getElementById("charLevel").textContent = player.level;
    document.getElementById("hpText").textContent = `${player.hp}/${d.hpMax}`;
    document.getElementById("hpBar").style.width = `${(player.hp / d.hpMax) * 100}%`;
    document.getElementById("mpText").textContent = `${player.mp}/${d.mpMax}`;
    document.getElementById("mpBar").style.width = `${(player.mp / d.mpMax) * 100}%`;
    const need = Player.expForLevel(player.level);
    document.getElementById("expText").textContent = `${player.exp}/${need}`;
    document.getElementById("expBar").style.width = `${(player.exp / need) * 100}%`;
    const stats = [
      ["STR", d.STR], ["DEX", d.DEX], ["INT", d.INT],
      ["VIT", d.VIT], ["WIS", d.WIS], ["LUK", d.LUK],
      ["ATK", d.atk], ["MAG", d.mag], ["DEF", d.def], ["RES", d.res],
      ["SPD", d.spd], ["CRIT", d.crit + "%"], ["DODGE", d.dodge + "%"]
    ];
    document.getElementById("statGrid").innerHTML =
      stats.map(([k,v]) => `<div class="row"><span class="name">${k}</span><span class="val">${v}</span></div>`).join("");
    document.getElementById("currencyLine").innerHTML = `
      <span class="c">Money <b>${player.money}</b></span>
      <span class="c">Gold <b>${player.gold}</b></span>
      <span class="c">Gem <b>${player.gem}</b></span>
      <span class="c">Soul <b>${player.soul}</b></span>
      <span class="c">Honor <b>${player.honor}</b></span>`;
    document.getElementById("equipList").innerHTML = ["weapon","armor","acc"].map(slot => {
      const id = player.equip[slot];
      const label = slot.charAt(0).toUpperCase() + slot.slice(1);
      return `<div class="list-item"><span><b>${label}:</b> ${id ? Items.get(id).name : "<i>—</i>"}</span></div>`;
    }).join("");
    const map = Maps.DB[player.map];
    if (map) {
      document.getElementById("mapInfo").innerHTML = `
        <b>${map.name}</b>
        <div style="font-size:13px; font-style:italic; color: var(--ink-soft);">${map.desc}</div>
        <div class="margin-note">recommended Lv. ${map.minLvl}+</div>`;
    }
    renderEnemy();
    renderActions();
  }
  function renderEnemy() {
    const e = Combat.getEnemy();
    const slot = document.getElementById("enemyArea");
    if (Combat.isInCombat() && e) {
      const pct = Math.max(0, (e.hp / e.hpMax) * 100);
      slot.innerHTML = `
        <div class="enemy ${e.special?'special':''}" id="enemyCard">
          ${e.miniboss ? '<span class="stamp">MINI-BOSS</span>' : ''}
          ${e.special ? '<span class="stamp" style="color:#6b1e8a; border-color:#6b1e8a;">SPECIAL</span>' : ''}
          <div class="sketch">${e.sketch}</div>
          <h3>${e.name}</h3>
          <div class="level">Lv. ${e.lvl}</div>
          <div class="bar-label" style="margin-top:8px;"><span>HP</span><span>${Math.max(0,e.hp)}/${e.hpMax}</span></div>
          <div class="bar"><span style="width:${pct}%"></span></div>
        </div>`;
    } else { slot.innerHTML = ""; }
  }
  function shake() {
    const card = document.getElementById("enemyCard");
    if (card) { card.classList.remove("hit"); void card.offsetWidth; card.classList.add("hit"); }
  }
  function renderActions() {
    const bar = document.getElementById("actionBar");
    bar.innerHTML = "";
    bar.classList.remove("battle-actions","explore-actions","actions");
    if (Combat.isInCombat()) {
      bar.classList.add("battle-actions");
      const skills = Classes.DB[player.cls].skills || [];
      // Attack — big banner across the top
      bar.appendChild(mkBtn("⚔ ATTACK", () => playerAct(null), "attack span2"));
      // Skills — 2 per row
      for (const sId of skills) {
        const sk = Classes.Skills[sId];
        if (!sk) continue;
        const b = mkBtn(`${sk.name}${sk.mp?` · ${sk.mp}MP`:""}`, () => playerAct(sId), "skill");
        if (player.mp < sk.mp) b.disabled = true;
        bar.appendChild(b);
      }
      // Item + Flee on bottom row
      bar.appendChild(mkBtn("🎒 ITEM", () => openInventory(true), "item"));
      bar.appendChild(mkBtn("🏃 FLEE", () => fleeAttempt(), "flee"));
    } else {
      bar.classList.add("explore-actions");
      bar.appendChild(mkBtn("⚔ EXPLORE", () => explore(), "attack"));
      bar.appendChild(mkBtn("🍃 Rest", () => quickRest(), "green"));
      bar.appendChild(mkBtn("📋 Quests", () => openCodex("quests"), "gold"));
    }
  }
  function mkBtn(label, fn, extra="") {
    const b = document.createElement("button");
    b.className = "btn " + extra;
    b.textContent = label; b.onclick = fn;
    return b;
  }
  function explore() {
    const enemy = Maps.rollEncounter(player.map, player.level);
    if (!enemy) { log("No encounters here.", "system"); return; }
    Combat.start(player, enemy, log); render();
  }
  function quickRest() {
    const d = Player.derived(player);
    const dh = Math.floor(d.hpMax * 0.2), dm = Math.floor(d.mpMax * 0.2);
    player.hp = Math.min(d.hpMax, player.hp + dh);
    player.mp = Math.min(d.mpMax, player.mp + dm);
    log(`You sit beneath a tree. (+${dh} HP, +${dm} MP)`, "heal"); render();
  }
  function playerAct(skillId) {
    if (!Combat.isInCombat()) return;
    Combat.playerAttack(skillId, log); shake();
    let r = Combat.checkEnd(log);
    if (r) { render(); return; }
    Combat.enemyTurn(log); Combat.checkEnd(log); render();
  }
  function fleeAttempt() {
    const d = Player.derived(player);
    const e = Combat.getEnemy();
    if (e.special) { log("The Soul Eater bars your retreat.", "special"); return; }
    if (Math.random() * 100 < 50 + d.spd - e.spd) {
      log("You slip back between paragraphs.", "system");
      Combat.endCombat();
    } else {
      log("You can't escape!", "system");
      Combat.enemyTurn(log); Combat.checkEnd(log);
    }
    render();
  }

  function openModal(title, body, options=[]) {
    document.getElementById("modalTitle").textContent = title;
    document.getElementById("modalBody").innerHTML = body;
    const op = document.getElementById("modalOptions");
    op.innerHTML = "";
    for (const o of options) op.appendChild(mkBtn(o.label, o.fn, o.extra || ""));
    document.getElementById("modalBack").classList.add("open");
  }
  function closeModal() { document.getElementById("modalBack").classList.remove("open"); }

  /* ---- CODEX (Bestiary / Items / Quests) ---- */
  let codexCurrentTab = "bestiary";
  function openCodex(tab) {
    if (tab) codexCurrentTab = tab;
    Quests.ensure(player);
    const tabs = ["bestiary", "items", "quests"];
    const tabBtns = tabs.map(t =>
      `<div class="codex-tab ${t === codexCurrentTab ? 'active' : ''}" data-codex-tab="${t}">${t === "bestiary" ? "📖 Bestiary" : t === "items" ? "🎒 Items" : "📋 Quests"}</div>`
    ).join("");

    let inner = "";
    if (codexCurrentTab === "bestiary") inner = renderBestiary();
    else if (codexCurrentTab === "items") inner = renderItemCodex();
    else if (codexCurrentTab === "quests") inner = renderQuestBoard();

    const html = `
      <div class="codex-tabs">${tabBtns}</div>
      <div class="codex-content" id="codexContent">${inner}</div>
    `;
    openModal("Codex", html, []);
    // Wire tab switches
    document.getElementById("modalBody").querySelectorAll("[data-codex-tab]").forEach(el => {
      el.onclick = () => { codexCurrentTab = el.dataset.codexTab; openCodex(); };
    });
    // Wire quest buttons
    document.getElementById("modalBody").querySelectorAll("[data-quest-action]").forEach(b => {
      b.onclick = () => {
        const qid = b.dataset.questId;
        const act = b.dataset.questAction;
        if (act === "accept") Quests.accept(player, qid);
        else if (act === "claim") Quests.claim(player, qid, log);
        render();
        openCodex(); // refresh
      };
    });
  }

  function renderBestiary() {
    const seen = player.bestiary || {};
    const allMons = Monsters._DB();
    const entries = Object.entries(allMons).map(([id, m]) => {
      const kills = seen[id] || 0;
      if (kills === 0) {
        return `<div class="codex-entry locked">

  /* ---- Sheets dialog ---- */
  // Extract base pub URL from any tab URL
  function baseUrlFromAny(u) {
    if (!u) return null;
    // Extract base pub URL by splitting on "?pub" or finding "/pub"
    const pubIdx = u.indexOf("/pub");
    if (pubIdx === -1) return null;
    const base = u.substring(0, pubIdx + 4); // keep "/pub"
    if (base.indexOf("docs.google.com/spreadsheets") === -1) return null;
    return base;
  }
  function tabUrl(base, gid) { return `${base}?gid=${gid}&single=true&output=csv`; }

  // Fetch sheet HTML index to discover tab gids by name
  async function discoverGids(baseUrl) {
    const html = await Sheets.fetchRaw(baseUrl + "?output=html");
    const result = {};
    // Find all gid=NUMBER patterns in the HTML
    let pos = 0;
    while (pos < html.length) {
      const gidTag = "gid=";
      const gi = html.indexOf(gidTag, pos);
      if (gi === -1) break;
      pos = gi + 4;
      let end = pos;
      while (end < html.length && html[end] >= "0" && html[end] <= "9") end++;
      const gid = html.substring(pos, end);
      if (!gid) continue;
      // Find the tab name — look for >TabName< after this position (within 200 chars)
      const closeIdx = html.indexOf(">", gi);
      const closeIdx2 = closeIdx > -1 ? html.indexOf("<", closeIdx) : -1;
      if (closeIdx > -1 && closeIdx2 > closeIdx && closeIdx2 - closeIdx < 60) {
        const raw = html.substring(closeIdx + 1, closeIdx2).trim();
        if (raw.length > 0 && raw.length < 40) {
          const name = raw.toLowerCase().replace(/[^a-z0-9]+/g, "_").replace(/^_+|_+$/g, "");
          if (name) result[name] = gid;
        }
      }
    }
    return result;
  }

  async function doAutoReload() {
    const s = document.getElementById("reloadStatus");
    const anyUrl = document.getElementById("urlAny")?.value.trim();
    if (!anyUrl) { s.textContent = "กรุณาวาง URL ก่อน"; s.className = "reload-status error"; return; }
    const base = baseUrlFromAny(anyUrl);
    if (!base) { s.textContent = "URL ไม่ถูกต้อง — ต้องเป็น URL จาก Google Sheets Publish to web"; s.className = "reload-status error"; return; }

    s.textContent = "⏳ กำลัง auto-detect tabs..."; s.className = "reload-status";
    try {
      let gids = {};
      try { gids = await discoverGids(base); } catch(e) { console.warn("GID discover failed:", e); }

      const TAB_KEYS = ["monsters","items","classes","skills","maps","config"];
      const resolved = {};

      // Match discovered gids to known tab names (fuzzy)
      for (const key of TAB_KEYS) {
        // exact match
        if (gids[key]) { resolved[key] = tabUrl(base, gids[key]); continue; }
        // partial match
        const fuzzy = Object.keys(gids).find(k => k.includes(key) || key.includes(k));
        if (fuzzy) resolved[key] = tabUrl(base, gids[fuzzy]);
      }

      // If we couldn't detect, try scanning gids 0,1,2... up to 15
      if (Object.keys(resolved).length === 0) {
        s.textContent = "⏳ Auto-detect ไม่สำเร็จ กำลัง scan tabs...";
        // Use the anyUrl's gid as the first tab, then scan numerically
        const anyGid = (anyUrl.match(/gid=(\d+)/) || [])[1];
        if (anyGid) {
          // Try to load it and check header row to identify which tab it is
          try {
            const text = await Sheets.fetchRaw(anyUrl);
            const firstRow = (text.split("\n")[0] || "").toLowerCase();
            for (const key of TAB_KEYS) {
              // Each tab has a unique header — monsters has "lvl", items has "slot", etc.
              const signatures = {
                monsters: ["lvl","exp_min","is_miniboss"],
                items: ["slot","effect_hp","bonus_atk"],
                classes: ["tier","growth_str","parent"],
                skills: ["power","recoil","multihit"],
                maps: ["pool","miniboss","min_lvl"],
                config: ["key","value","description"]
              };
              if (signatures[key] && signatures[key].some(sig => firstRow.includes(sig))) {
                resolved[key] = anyUrl; break;
              }
            }
          } catch(e) {}
        }
      }

      if (Object.keys(resolved).length === 0) {
        s.innerHTML = "❌ ไม่สามารถ detect tabs ได้<br><small>ตรวจสอบว่า Sheet เป็น <b>Publish to web</b> แบบ Public</small>";
        s.className = "reload-status error"; return;
      }

      Sheets.saveConfig({ sheetId: "", tabs: resolved });
      s.textContent = `⏳ พบ ${Object.keys(resolved).length} tabs: ${Object.keys(resolved).join(", ")} — กำลังโหลด...`;

      await applyReload(s);
    } catch(e) {
      console.error(e);
      s.innerHTML = `❌ ${e.message}<br><small>ตรวจสอบ: Sheet ต้อง Publish to web และเลือก format CSV</small>`;
      s.className = "reload-status error";
    }
  }

  async function applyReload(s) {
    try {
      const data = await Sheets.loadAll();
      let changed = [];
      if (data.config)   { Config.loadFromRows(data.config);            changed.push("config"); }
      if (data.items)    { Items.loadFromRows(data.items);              changed.push("items"); }
      if (data.skills)   { Classes.loadSkillsFromRows(data.skills);    changed.push("skills"); }
      if (data.classes)  { Classes.loadClassesFromRows(data.classes);  changed.push("classes"); }
      if (data.monsters) { Monsters.loadFromRows(data.monsters);       changed.push("monsters"); }
      if (data.maps)     { Maps.loadFromRows(data.maps);               changed.push("maps"); }

      if (changed.length === 0) {
        if (s) { s.textContent = "ไม่มี tab ที่โหลดได้ — ลองวาง URL ของแต่ละ tab ด้วยตนเอง"; s.className = "reload-status error"; }
        return;
      }
      setSourceTag("live", "LIVE FROM SHEETS");
      if (player) { Player.recompute(player); render(); }
      log("Loaded from Google Sheets: " + changed.join(", ") + ".", "loot");
      if (s) { s.textContent = "✅ โหลดสำเร็จ: " + changed.join(", "); s.className = "reload-status ok"; }
    } catch (e) {
      console.error(e);
      setSourceTag("error", "SHEETS ERROR");
      if (s) {
        s.innerHTML = "❌ " + (e.message||"Error") + "<br><small>ตรวจสอบ: Sheet ต้อง Publish to web และ format CSV</small>";
        s.className = "reload-status error";
      }
    }
  }

    if (Sheets.isConfigured()) {
      try {
        const data = await Sheets.loadAll();

        if (data.items)    Items.loadFromRows(data.items);
        if (data.skills)   Classes.loadSkillsFromRows(data.skills);
        if (data.classes)  Classes.loadClassesFromRows(data.classes);
        if (data.monsters) Monsters.loadFromRows(data.monsters);

          // Validate save has required fields
          if (!Classes.DB[p.cls]) {
            log("Save class invalid — starting new game.", "system");
            SaveSystem.clear();
            showCharCreate();
            return;
          }
          player = p;
          if (!player.flags) player.flags = { soulEaterSlain:false, hexedFoe:0, dodgeBuff:0 };
          Player.recompute(player);
          log("Continuing your tale...", "system"); render();
          return;
        }
        SaveSystem.clear(); // clear invalid save
      }
    } catch(e) {
      console.error("Save load failed, clearing:", e);
      SaveSystem.clear();
    }
    showCharCreate();
  }

  return { init };
})();

document.addEventListener("DOMContentLoaded", Game.init);
</script>
</body>
</html>
