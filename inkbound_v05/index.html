<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inkbound v0.5</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="paper">
  <header>
    <h1>Inkbound <span>&amp;</span> Bound</h1>
    <div class="sub">— a paper RPG, modular edition —</div>
  </header>

  <div class="columns">
    <aside>
      <div class="panel">
        <h2>Adventurer</h2>
        <div id="char-name" style="font-family:var(--hand);font-size:22px;">—</div>
        <div id="char-class" style="font-size:14px;">—</div>

        <div class="bar-label" style="margin-top:10px;"><span>HP</span><span id="hp-text">0/0</span></div>
        <div class="bar"><span id="hp-bar"  class="bar-fill hp-fill"  style="width:100%"></span></div>

        <div class="bar-label"><span>MP</span><span id="mp-text">0/0</span></div>
        <div class="bar"><span id="mp-bar"  class="bar-fill mp-fill"  style="width:100%"></span></div>

        <div class="bar-label"><span>EXP</span><span id="exp-text">0/10</span></div>
        <div class="bar"><span id="exp-bar" class="bar-fill exp-fill" style="width:0%"></span></div>

        <div id="stats"></div>
      </div>

      <div class="panel dashed">
        <h2>Coin Pouch</h2>
        <div id="currency">—</div>
      </div>

      <div class="panel">
        <h2>Pack</h2>
        <div id="inventory-list"></div>
      </div>
    </aside>

    <main>
      <div class="panel">
        <h2>The Page Turns…</h2>
        <div id="enemy-area"></div>
        <div id="log"></div>
        <div id="action-bar"></div>
      </div>
    </main>
  </div>
</div>

<!-- Modal -->
<div id="modal">
  <div class="modal-box" id="modal-body"></div>
</div>

<!-- Button bars -->
<div class="btn-bar">
  <button class="btn btn-rest"  onclick="openInn()">🏨 Inn</button>
  <button class="btn"           onclick="openTravel()">🗺 Travel</button>
  <button class="btn btn-skill" onclick="openClassChange()">⚔ Class</button>
  <button class="btn"           onclick="openQuestBoard()">📜 Quests</button>
  <button class="btn"           style="color:var(--purple)" onclick="openSoulShop()">👁 Soul Shop</button>
</div>
<div class="btn-bar">
  <button class="btn btn-rest"  onclick="gameSave()">💾 Save</button>
  <button class="btn btn-skill" onclick="openShop()">🛒 Shop</button>
  <button class="btn"           onclick="connectSheets()">⚙ Sheets</button>
  <button class="btn btn-skill" onclick="gameLoad()">📂 Load</button>
  <button class="btn"           style="color:var(--red)" onclick="gameReset()">↺ New Game</button>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
